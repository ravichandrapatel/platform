# =============================================================================
# Platform Component Manager
# =============================================================================
# Manually promote or rollback version tags for platform components (e.g.
# actions/my-action, images/my-image). Uses immutable full-version tags and
# movable stable (major) tags so consumers can pin to a version or follow v1.
#
# ACTIONS: Only actions/checkout@v4. No third-party actions; no docker/*.
# All tag operations use git + GITHUB_TOKEN (contents: write).
# =============================================================================

name: Platform Component Manager

on:
  workflow_dispatch:
    inputs:
      component_path:
        description: 'Folder path (e.g., actions/my-action)'
        required: true
        type: string
      mode:
        description: 'Action'
        required: true
        type: choice
        options:
          - promote
          - rollback
      version:
        description: 'Target Version (e.g., 1.2.0)'
        required: true
        type: string

jobs:
  manage-component:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # --- Official GitHub action only; fetch-depth 0 needed for tag history ---
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Promote: create FULL_TAG at HEAD, move STABLE_TAG to HEAD, push both.
      # Rollback: move STABLE_TAG to the commit of existing FULL_TAG, push STABLE_TAG only.
      - name: Execute Tag Flip
        run: |
          PATH_NAME="${{ github.event.inputs.component_path }}"
          VER="${{ github.event.inputs.version }}"
          MAJOR="v$(echo "$VER" | cut -d. -f1)"
          FULL_TAG="${PATH_NAME}/${VER}"
          STABLE_TAG="${PATH_NAME}/${MAJOR}"

          if [ "${{ github.event.inputs.mode }}" = "promote" ]; then
            echo "Promoting $PATH_NAME to version $VER..."
            git tag "$FULL_TAG" -m "Release $PATH_NAME $VER"
            git tag -f "$STABLE_TAG" -m "Stable $PATH_NAME $MAJOR"
            git push origin "$FULL_TAG"
            git push origin "$STABLE_TAG" --force
          else
            echo "Rolling back $STABLE_TAG to point to $FULL_TAG..."
            git tag -f "$STABLE_TAG" "$FULL_TAG"
            git push origin "$STABLE_TAG" --force
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
