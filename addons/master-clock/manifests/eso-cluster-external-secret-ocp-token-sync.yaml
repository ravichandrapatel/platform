# Broadcasts GitHub token to all namespaces labeled type: ci-pipeline. Refreshes every 25 minutes
# (tokens expire in 60m). Secret format: kubernetes.io/basic-auth for Tekton (username: x-access-token).
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: ocp-token-sync
spec:
  externalSecretName: github-token
  namespaceSelectors:
    - matchLabels:
        type: ci-pipeline
  refreshTime: "25m"
  externalSecretSpec:
    refreshInterval: "25m"
    refreshPolicy: Periodic
    target:
      name: github-token
      creationPolicy: Owner
      template:
        type: kubernetes.io/basic-auth
        data:
          username: "x-access-token"
          password: "{{ .token }}"
    dataFrom:
      - sourceRef:
          generatorRef:
            apiVersion: generators.external-secrets.io/v1alpha1
            kind: ClusterGenerator
            name: github-token-generator
