# Create this Secret (or sync via ESO/Vault) so the GithubAccessToken generator can sign JWTs.
# The generator expects secret name "github-app-pem" with key "key" (PEM content).
#
# Create manually (do not commit real keys):
#   kubectl create secret generic github-app-pem --from-file=key=./private-key.pem -n master-clock
#
# Ensure github-app-pem exists in every namespace with label type: ci-pipeline (including master-clock).
---
apiVersion: v1
kind: Secret
metadata:
  name: github-app-pem
  namespace: master-clock
type: Opaque
stringData:
  # Replace via: kubectl create secret generic github-app-pem --from-file=key=./key.pem -n master-clock --dry-run=client -o yaml | kubectl apply -f -
  key: "REPLACE_WITH_GITHUB_APP_PRIVATE_KEY_PEM"
