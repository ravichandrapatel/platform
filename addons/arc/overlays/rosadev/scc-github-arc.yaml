# Based on restricted SCC; allows ARC runner pods to run as UID 1001 / GID 123 (non-root).
# SETUID/SETGID are not dropped so rootless Podman can use newuidmap/newgidmap (e.g. for
# dependency-check and other container-in-container workflows). See Red Hat solution 7045022.
# See: https://developers.redhat.com/articles/2025/02/17/how-securely-deploy-github-arc-openshift
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: github-arc
  annotations:
    kubernetes.io/description: "ARC runner scale set; non-root uid 1001, gid 123; rootless Podman (newuidmap) allowed"
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: true
allowPrivilegedContainer: false
# Allow runner pod to add SETUID/SETGID (newuidmap) and SYS_ADMIN (crun mount proc in nested container).
allowedCapabilities:
  - SETUID
  - SETGID
  - SYS_ADMIN
defaultAddCapabilities: null
fsGroup:
  type: MustRunAs
  ranges:
    - min: 123
      max: 123
groups: []
priority: null
readOnlyRootFilesystem: false
# Do not drop SETUID/SETGID: rootless Podman needs them for newuidmap/newgidmap (user namespace setup).
requiredDropCapabilities:
  - KILL
  - MKNOD
runAsUser:
  type: MustRunAs
  uid: 1001
seLinuxContext:
  type: MustRunAs
supplementalGroups:
  type: MustRunAs
  ranges:
    - min: 123
      max: 123
users: []
volumes:
  - configMap
  - csi
  - downwardAPI
  - emptyDir
  - ephemeral
  - persistentVolumeClaim
  - projected
  - secret
