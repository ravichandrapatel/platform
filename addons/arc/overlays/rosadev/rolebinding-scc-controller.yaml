# Grants the controller SA permission to use the github-arc-controller SCC so
# the controller pod can run with runAsUser 1000, runAsGroup 123, fsGroup 123.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: arc-controller-scc
  namespace: arc-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:github-arc-controller
subjects:
  - kind: ServiceAccount
    name: arc-controller
    namespace: arc-system
