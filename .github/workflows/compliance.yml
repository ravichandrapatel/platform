# =============================================================================
# Compliance
# =============================================================================
# Trivy config+fs scan per image (images/ with Containerfile); optional build+push
# (Podman/Buildah) only when Critical=0; updates compliance.md and readme badges.
# Schedule: first Sunday of month; manual with image_to_build (ALL or single name).
# Root registry same for all; sub-registry = image folder name. Tags: latest + run_id.
#
# ACTIONS: Only actions/checkout@v4, actions/upload-artifact@v4, actions/download-artifact@v4.
# No third-party actions; no docker/*. Trivy installed via curl (binary), not aquasecurity/trivy-action.
# =============================================================================

name: Compliance

# CKV2_GHA_1: explicit top-level permissions (default read-only); report job overrides with contents: write
permissions:
  contents: read

on:
  schedule:
    - cron: '0 2 1-7 * 0'
  # checkov:skip=CKV_GHA_7:manual dispatch only; inputs are allowlisted (image name, registry) and do not affect build integrity
  workflow_dispatch:
    inputs:
      image_to_build:
        description: 'Image to build (folder name under images/). Use ALL for every image, or a single name for manual build'
        required: false
        default: 'ALL'
      registry:
        description: 'Root registry for push (host or host:port, e.g. ghcr.io, myreg.example.com:5000). Sub-registry = image folder name. Default: ghcr.io'
        required: false
        default: 'ghcr.io'
      pull_registry:
        description: 'Root registry for pull if different (host:port); leave empty to use push registry'
        required: false

jobs:
  # Outputs JSON array of image names for matrix: either all images with Containerfile or single image (image_to_build).
  discovery:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: List image folders (with Containerfile or Dockerfile)
        id: list
        run: |
          if [ -d "devtools-landingzone/images" ]; then
            BASE=devtools-landingzone/images
          else
            BASE=images
          fi
          IMG_INPUT="${{ inputs.image_to_build || 'ALL' }}"
          # Temporary: exclude from compliance for testing; remove when no longer needed.
          EXCLUDE_IMAGES="owasp-dependency-check"
          if [ "$IMG_INPUT" = "ALL" ] || [ -z "$IMG_INPUT" ]; then
            LIST=$(for d in "$BASE"/*/; do
              [ -f "${d}Containerfile" ] || [ -f "${d}Dockerfile" ] || continue
              name=$(basename "$d")
              case " $EXCLUDE_IMAGES " in *" $name "*) continue ;; esac
              echo "$name"
            done | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            case " $EXCLUDE_IMAGES " in *" $IMG_INPUT "*)
              echo "::error::Image '$IMG_INPUT' is excluded from compliance checks."
              exit 1
              ;;
            esac
            if [ ! -f "$BASE/$IMG_INPUT/Containerfile" ] && [ ! -f "$BASE/$IMG_INPUT/Dockerfile" ]; then
              echo "::error::Image folder '$IMG_INPUT' not found or has no Containerfile/Dockerfile under $BASE"
              exit 1
            fi
            LIST=$(jq -n -c --arg n "$IMG_INPUT" '[$n]')
          fi
          echo "matrix=$LIST" >> $GITHUB_OUTPUT
          echo "Images: $LIST"

  # Per-image: Trivy config+fs, merge to trivy-results.json, build+push only if Critical=0, upload artifact.
  compliance:
    needs: discovery
    if: needs.discovery.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    env:
      REGISTRY: ${{ inputs.registry || 'ghcr.io' }}
      PULL_REGISTRY: ${{ inputs.pull_registry || inputs.registry || 'ghcr.io' }}
      # GHCR requires ghcr.io/OWNER/IMAGE; repository_owner is the org or user that owns the repo.
      GHCR_NAMESPACE: ${{ github.repository_owner }}
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        image: ${{ fromJson(needs.discovery.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      # Buildah only for builds (ARC-friendly; no Docker). Rootful build for UBI/rootless base images.
      - name: Install Buildah
        run: |
          if ! command -v buildah &>/dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y buildah
          fi
          buildah --version

      - name: Set container runtime to Buildah
        id: runtime
        run: echo "runtime=buildah" >> $GITHUB_OUTPUT

      - name: Set image path
        id: path
        run: |
          if [ -d "devtools-landingzone/images" ]; then
            echo "dir=devtools-landingzone/images/${{ matrix.image }}" >> $GITHUB_OUTPUT
          else
            echo "dir=images/${{ matrix.image }}" >> $GITHUB_OUTPUT
          fi

      - name: Show registry (root + sub-registry = image name)
        run: |
          echo "Root registry (push): ${{ env.REGISTRY }}"
          echo "Root registry (pull): ${{ env.PULL_REGISTRY }}"
          echo "Sub-registry (image name): ${{ matrix.image }}"
          if [ "${{ env.REGISTRY }}" = "ghcr.io" ]; then
            echo "Full push ref: ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ matrix.image }}:latest and :${{ github.run_id }}"
            echo "Full pull ref: ${{ env.PULL_REGISTRY }}/${{ env.GHCR_NAMESPACE }}/${{ matrix.image }}:latest"
          else
            echo "Full push ref: ${{ env.REGISTRY }}/${{ matrix.image }}:latest and :${{ github.run_id }}"
            echo "Full pull ref: ${{ env.PULL_REGISTRY }}/${{ matrix.image }}:latest"
          fi

      # Trivy: download binary via curl (no aquasecurity/trivy-action).
      - name: Install Trivy
        run: |
          V=$(curl -sSfL https://api.github.com/repos/aquasecurity/trivy/releases/latest \
            | jq -r .tag_name | sed 's/^v//')

          ARCH="${{ runner.arch }}"
          case "$ARCH" in
            X64)   T_ARCH="Linux-64bit" ;;
            ARM64) T_ARCH="Linux-ARM64" ;;
            *)
              echo "::error::Unsupported runner.arch: $ARCH"
              exit 1
              ;;
          esac

          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${V}/trivy_${V}_${T_ARCH}.tar.gz" \
            | sudo tar xz -C /usr/local/bin trivy
          chmod +x /usr/local/bin/trivy
          trivy --version

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('devtools-landingzone/.github/workflows/compliance.yml') }}
          restore-keys: |
            trivy-db-${{ runner.os }}-${{ runner.arch }}-

      - name: Trivy config
        run: |
          cd "${{ steps.path.outputs.dir }}"
          trivy config . --format json -o trivy-config.json || true

      - name: Trivy fs
        run: |
          cd "${{ steps.path.outputs.dir }}"
          trivy fs . --format json -o trivy-fs.json || true

      # devtools-landingzone/scripts/trivy_merge_results.py (stdlib only) merges config+fs JSON and adds scan_date.
      - name: Merge results and add scan date
        run: |
          SCAN_DATE=$(date -u +%Y-%m-%d)
          if [ -f "devtools-landingzone/scripts/trivy_merge_results.py" ]; then
            python3 devtools-landingzone/scripts/trivy_merge_results.py --dir "${{ steps.path.outputs.dir }}" --scan-date "$SCAN_DATE"
          else
            python3 scripts/trivy_merge_results.py --dir "${{ steps.path.outputs.dir }}" --scan-date "$SCAN_DATE"
          fi

      - name: Count Critical vulnerabilities
        id: critical
        run: |
          if [ -f "devtools-landingzone/scripts/trivy_merge_results.py" ]; then
            C=$(python3 devtools-landingzone/scripts/trivy_merge_results.py --print-critical-count --dir "${{ steps.path.outputs.dir }}")
          else
            C=$(python3 scripts/trivy_merge_results.py --print-critical-count --dir "${{ steps.path.outputs.dir }}")
          fi
          echo "count=$C" >> $GITHUB_OUTPUT
          echo "Critical count: $C"

      # Rootful build: UBI and similar base images need full UID/GID in user namespace.
      # Login as root so build/push (also run with sudo) share the same auth.
      - name: Log in to registry
        if: steps.critical.outputs.count == '0'
        run: |
          RT="${{ steps.runtime.outputs.runtime }}"
          REG="${{ env.REGISTRY }}"
          if [ "$REG" = "ghcr.io" ]; then
            if [ "${{ github.event_name }}" = "schedule" ] && [ -n "${{ secrets.GHCR_SERVICE_USERNAME }}" ] && [ -n "${{ secrets.GHCR_SERVICE_TOKEN }}" ]; then
              USER="${{ secrets.GHCR_SERVICE_USERNAME }}"
              PASS="${{ secrets.GHCR_SERVICE_TOKEN }}"
            else
              USER="${{ github.actor }}"
              PASS="${{ secrets.GITHUB_TOKEN }}"
            fi
            echo "$PASS" | sudo -E "$RT" login ghcr.io -u "$USER" --password-stdin
          else
            echo "${{ secrets.CONTAINER_REGISTRY_PASSWORD }}" | sudo -E "$RT" login "$REG" -u "${{ secrets.CONTAINER_REGISTRY_USERNAME }}" --password-stdin
          fi

      # Run build/push as root so UBI and other images with fixed UID/GID layers succeed.
      - name: Build and push image (only if Critical = 0)
        if: steps.critical.outputs.count == '0'
        run: |
          RT="${{ steps.runtime.outputs.runtime }}"
          REG="${{ env.REGISTRY }}"
          SUB="${{ matrix.image }}"
          TAG2="${{ github.run_id }}"
          if [ "$REG" = "ghcr.io" ]; then
            FULL_LATEST="ghcr.io/${{ env.GHCR_NAMESPACE }}/$SUB:latest"
            FULL_TAG2="ghcr.io/${{ env.GHCR_NAMESPACE }}/$SUB:$TAG2"
          else
            FULL_LATEST="$REG/$SUB:latest"
            FULL_TAG2="$REG/$SUB:$TAG2"
          fi
          cd "${{ steps.path.outputs.dir }}"
          FILE=""
          if [ -f "Containerfile" ]; then
            FILE="Containerfile"
          elif [ -f "Dockerfile" ]; then
            FILE="Dockerfile"
          else
            echo "::error::No Containerfile or Dockerfile found in $(pwd)"
            exit 1
          fi
          sudo -E "$RT" build -t "${{ matrix.image }}:compliance" -f "$FILE" .
          sudo -E "$RT" tag "${{ matrix.image }}:compliance" "$FULL_LATEST"
          sudo -E "$RT" push "$FULL_LATEST"
          sudo -E "$RT" tag "${{ matrix.image }}:compliance" "$FULL_TAG2"
          sudo -E "$RT" push "$FULL_TAG2"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Official action only: upload artifact for report job.
      - name: Upload trivy-results for report job
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.image }}
          path: ${{ steps.path.outputs.dir }}/trivy-results.json

  # Restore trivy-results into image dirs, run update_readme.py (compliance.md + readme badges), commit [skip ci].
  report:
    needs: [discovery, compliance]
    # Run report whenever the workflow wasn't explicitly cancelled and discovery produced work.
    if: ${{ !cancelled() && needs.discovery.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    # contents: write for push. Use COMMIT_TOKEN (PAT) secret if branch protection blocks GITHUB_TOKEN.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Official action only: download artifacts from this run (one or many).
      - name: "Download all trivy-results (this run only: one artifact for single-image, many for ALL)"
        uses: actions/download-artifact@v4
        with:
          pattern: trivy-*
          merge-multiple: false

      - name: Restore trivy-results.json into image folders
        run: |
          for dir in trivy-*/; do
            [ -d "$dir" ] || continue
            name="${dir#trivy-}"
            name="${name%/}"
            if [ -d "devtools-landingzone/images/$name" ]; then
              cp "$dir/trivy-results.json" "devtools-landingzone/images/$name/"
            elif [ -d "images/$name" ]; then
              cp "$dir/trivy-results.json" "images/$name/"
            fi
          done

      # update_readme.py: upsert table in compliance.md, badge + link in readme; --repo for badge URL.
      - name: Update compliance and readme with Python script
        run: |
          REPO="${{ github.repository }}"
          if [ -f "devtools-landingzone/scripts/update_readme.py" ]; then
            python3 devtools-landingzone/scripts/update_readme.py --repo "$REPO"
          else
            python3 scripts/update_readme.py --repo "$REPO"
          fi

      - name: Commit and push compliance + readme [skip ci]
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in readme.md devtools-landingzone/readme.md compliance.md devtools-landingzone/compliance.md; do
            [ -f "$f" ] && ! git diff --quiet "$f" && git add "$f"
          done
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore(platform): update compliance table and badges [skip ci]"
          git push
        env:
          # Use COMMIT_TOKEN (PAT) if branch protection blocks GITHUB_TOKEN; otherwise GITHUB_TOKEN
          GITHUB_TOKEN: ${{ secrets.COMMIT_TOKEN || secrets.GITHUB_TOKEN }}
