# =============================================================================
# Terraform: daily data-source refresh
# =============================================================================
# Runs once per day (and optionally via workflow_dispatch) to refresh Terraform
# state with current data source values. Use with main workflow using
# -refresh=false on plan so PR/push use this cached state.
# See readme-terraform.md "Data source refresh (daily cache)".
# =============================================================================

name: Terraform daily refresh

on:
  schedule:
    # 06:00 UTC daily
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      working_directory:
        description: 'Terraform root (e.g. . or terraform/)'
        required: false
        default: '.'
      terraform_version:
        description: 'Terraform version'
        required: false
        default: '1.9.0'
      terraform_exec_iam_role:
        description: 'IAM role ARN for Terraform (OIDC)'
        required: false
      terraform_exec_role_region:
        description: 'AWS region for exec role'
        required: false
        default: 'us-east-1'

env:
  TF_WORKING_DIR: ${{ github.event_name == 'workflow_dispatch' && inputs.working_directory || '.' }}
  TF_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.terraform_version || '1.9.0' }}
  TF_EXEC_IAM_ROLE: ${{ github.event_name == 'workflow_dispatch' && inputs.terraform_exec_iam_role || vars.TF_EXEC_IAM_ROLE || '' }}
  TF_EXEC_ROLE_REGION: ${{ github.event_name == 'workflow_dispatch' && inputs.terraform_exec_role_region || vars.TF_EXEC_ROLE_REGION || 'us-east-1' }}

jobs:
  refresh-only:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub App token (private modules)
        id: app-token
        if: vars.TF_MODULES_APP_ID != ''
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.TF_MODULES_APP_ID }}
          private-key: ${{ secrets.TF_MODULES_APP_PRIVATE_KEY }}
          owner: ${{ vars.TF_MODULES_APP_OWNER || github.repository_owner }}

      - name: Configure Git for private Terraform modules
        if: vars.TF_MODULES_APP_ID != '' && steps.app-token.outputs.token != ''
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "git@github.com:"

      - name: Configure AWS credentials (OIDC)
        if: env.TF_EXEC_IAM_ROLE != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TF_EXEC_IAM_ROLE }}
          aws-region: ${{ env.TF_EXEC_ROLE_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      # Discover *.tfvars under TF_WORKING_DIR; cap at 50 workspaces per run
      - name: Refresh state (apply -refresh-only) for all workspaces
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set -e
          MAX=50
          FILES=$(find . -maxdepth 6 -name '*.tfvars' -not -path './.git/*' | sed 's|^\./||' | sort | head -n $MAX)
          COUNT=0
          for tfvars_file in $FILES; do
            [ -z "$tfvars_file" ] && continue
            workspace=$(basename "$tfvars_file" .tfvars)
            if terraform workspace select "$workspace" 2>/dev/null; then
              echo "Refreshing workspace: $workspace"
            else
              terraform workspace new "$workspace"
              echo "Created and refreshing workspace: $workspace"
            fi
            terraform apply -input=false -refresh-only -auto-approve -var-file="$tfvars_file" || true
            COUNT=$((COUNT + 1))
          done
          if [ $COUNT -eq 0 ]; then
            echo "No .tfvars files found under TF_WORKING_DIR (max depth 6). Skipping refresh."
          else
            echo "Refreshed $COUNT workspace(s)."
          fi
