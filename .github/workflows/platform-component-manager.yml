# =============================================================================
# Platform Component Manager
# =============================================================================
# Promote or rollback version tags for ACTIONS and WORKFLOWS.
# - Actions: component_path = e.g. platform/actions/my-action.
# - Workflows: component_path = workflows/<name> (folder). On promote, copies
#   workflows/<name>/* to .github/workflows/, then tags. Tag = only that workflow.
# See readme-platform-component-manager.md.
# ACTIONS: Only actions/checkout@v4. Contents: write for tags and workflow publish.
# =============================================================================

name: Platform Component Manager

on:
  workflow_dispatch:
    inputs:
      component_path:
        description: 'Path: platform/actions/my-action OR workflows/name OR platform/workflows/name'
        required: true
        type: string
      mode:
        description: 'Action'
        required: true
        type: choice
        options:
          - promote
          - rollback
      version:
        description: 'Target Version (e.g., 1.2.0)'
        required: true
        type: string
      tag_content:
        description: 'Tag points to (monorepo = whole repo; subtree = only action code)'
        required: false
        type: choice
        default: monorepo
        options:
          - monorepo
          - subtree

concurrency:
  group: platform-component-manager-${{ github.event.inputs.component_path }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Validate inputs and component layout
        shell: bash
        run: |
          set -euo pipefail
          PATH_NAME="${{ github.event.inputs.component_path }}"
          MODE="${{ github.event.inputs.mode }}"
          TAG_CONTENT="${{ github.event.inputs.tag_content || 'monorepo' }}"

          echo "component_path=$PATH_NAME"
          echo "mode=$MODE"
          echo "tag_content=$TAG_CONTENT"

          if [ ! -d "$PATH_NAME" ] && [ ! -f "$PATH_NAME" ]; then
            echo "::error::component_path not found: $PATH_NAME"
            exit 1
          fi

          case "$PATH_NAME" in
            workflows/*|platform/workflows/*)
              if [ -d "$PATH_NAME" ]; then
                if ! ls "$PATH_NAME"/* >/dev/null 2>&1; then
                  echo "::error::Workflow folder is empty: $PATH_NAME"
                  exit 1
                fi
              else
                case "$PATH_NAME" in
                  *.yml|*.yaml) ;;
                  *)
                    echo "::error::Workflow file must be .yml or .yaml: $PATH_NAME"
                    exit 1
                    ;;
                esac
              fi
              ;;
            actions/*|platform/actions/*)
              if [ ! -d "$PATH_NAME" ]; then
                echo "::error::Action path must be a directory: $PATH_NAME"
                exit 1
              fi
              if [ ! -f "$PATH_NAME/action.yml" ] && [ ! -f "$PATH_NAME/action.yaml" ]; then
                echo "::error::Missing action.yml in $PATH_NAME"
                exit 1
              fi
              ;;
            *)
              echo "::warning::Unrecognized component_path prefix. Expected actions/* or workflows/*."
              ;;
          esac

      - name: Lint workflow YAML (actionlint)
        shell: bash
        run: |
          set -euo pipefail
          PATH_NAME="${{ github.event.inputs.component_path }}"

          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

          case "$PATH_NAME" in
            workflows/*|platform/workflows/*)
              if [ -d "$PATH_NAME" ]; then
                shopt -s nullglob
                files=( "$PATH_NAME"/*.yml "$PATH_NAME"/*.yaml )
                shopt -u nullglob
                if [ "${#files[@]}" -eq 0 ]; then
                  echo "::error::No .yml/.yaml files found under $PATH_NAME"
                  exit 1
                fi
                ./actionlint -color .github/workflows/platform-component-manager.yml "${files[@]}"
              else
                ./actionlint -color .github/workflows/platform-component-manager.yml "$PATH_NAME"
              fi
              ;;
            *)
              echo "Not a workflow component; skip actionlint."
              ;;
          esac

  manage-component:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write

    steps:
      # --- Official GitHub action only; fetch-depth 0 needed for tag history ---
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Workflow publish: if component_path is workflows/<name> or platform/workflows/<name>, copy to .github/workflows/ then tag.
      - name: Publish workflow to .github/workflows (if workflows path)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_TOKEN: ${{ secrets.COMMIT_TOKEN }}
        run: |
          PATH_NAME="${{ github.event.inputs.component_path }}"
          if [ "${{ github.event.inputs.mode }}" != "promote" ]; then
            echo "Skip publish step (rollback)."
            exit 0
          fi
          case "$PATH_NAME" in
            workflows/*|platform/workflows/*)
              if [ -z "${COMMIT_TOKEN:-}" ]; then
                echo "::error::This operation modifies .github/workflows. Configure secret COMMIT_TOKEN (PAT with repo + workflow) to push workflow updates."
                exit 1
              fi
              TOKEN="${COMMIT_TOKEN}"
              REPO="${GITHUB_REPOSITORY:-$(git remote get-url origin | sed -n 's/.*github\.com[:\/]\(.*\)\.git/\1/p')}"
              [ -n "$REPO" ] && git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${REPO}.git"

              mkdir -p .github/workflows
              if [ -d "$PATH_NAME" ]; then
                for f in "$PATH_NAME"/*; do
                  [ -e "$f" ] || continue
                  [ -f "$f" ] || continue
                  case "$f" in
                    *.yml|*.yaml) ;;
                    *) continue ;;
                  esac
                  cp "$f" ".github/workflows/$(basename "$f")"
                done
              elif [ -f "$PATH_NAME" ]; then
                case "$PATH_NAME" in
                  *.yml|*.yaml) ;;
                  *)
                    echo "::error::Workflow file must be .yml or .yaml: $PATH_NAME"
                    exit 1
                    ;;
                esac
                cp "$PATH_NAME" ".github/workflows/$(basename "$PATH_NAME")"
              else
                echo "::error::Workflow path $PATH_NAME not found (use folder workflows/name/ or platform/workflows/name/ or file)."
                exit 1
              fi
              git add .github/workflows/
              if ! git diff --staged --quiet; then
                git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
                  commit -m "Publish workflow $PATH_NAME to .github/workflows"
                git push origin HEAD
              fi
              echo "WORKFLOW_PUBLISHED=1" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Not a workflow path; skip publish."
              ;;
          esac
      # Promote: create FULL_TAG (monorepo at HEAD, or subtree = only component code). Rollback: move STABLE_TAG to existing FULL_TAG.
      - name: Execute Tag Flip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_TOKEN: ${{ secrets.COMMIT_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          PATH_NAME="${{ github.event.inputs.component_path }}"
          VER="${{ github.event.inputs.version }}"
          TAG_CONTENT="${{ github.event.inputs.tag_content || 'monorepo' }}"
          MAJOR="v$(echo "$VER" | cut -d. -f1)"
          FULL_TAG="${PATH_NAME}/${VER}"
          STABLE_TAG="${PATH_NAME}/${MAJOR}"
          SUBTREE_BRANCH="release/subtree-$(echo "$PATH_NAME" | tr '/' '-')-${VER}"

          NEED_PAT=0
          case "$PATH_NAME" in
            workflows/*|platform/workflows/*) NEED_PAT=1 ;;
            *)
              if [ "$TAG_CONTENT" = "monorepo" ]; then
                NEED_PAT=1
              fi
              ;;
          esac

          if [ "$NEED_PAT" -eq 1 ]; then
            if [ -z "${COMMIT_TOKEN:-}" ]; then
              echo "::error::This operation updates a ref that contains workflow files. Configure secret COMMIT_TOKEN (PAT with repo + workflow) to push tags/rollbacks."
              exit 1
            fi
            TOKEN="${COMMIT_TOKEN}"
          else
            TOKEN="${GITHUB_TOKEN}"
          fi
          REPO="${GITHUB_REPOSITORY:-$(git remote get-url origin | sed -n 's/.*github\.com[:\/]\(.*\)\.git/\1/p')}"
          [ -n "$REPO" ] && git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${REPO}.git"

          if [ "${{ github.event.inputs.mode }}" = "promote" ]; then
            echo "Promoting $PATH_NAME to version $VER (tag_content=$TAG_CONTENT)..."
            ORIG_REF=$(git rev-parse HEAD)
            ORIG_BRANCH=$(git branch --show-current 2>/dev/null || true)
            if [ -z "$ORIG_BRANCH" ]; then
              ORIG_BRANCH="main"
            fi

            if [ "$TAG_CONTENT" = "subtree" ]; then
              if [ ! -d "$PATH_NAME" ] && [ ! -f "$PATH_NAME" ]; then
                echo "::error::Path $PATH_NAME not found (required for subtree)."
                exit 1
              fi

              if [ "${PATH_NAME#workflows/}" != "$PATH_NAME" ] || [ "${PATH_NAME#platform/workflows/}" != "$PATH_NAME" ]; then
                # Workflow subtree: tag contains only .github/workflows/<files we published>
                git checkout --orphan "$SUBTREE_BRANCH"
                git rm -rf .
                if [ -d "$PATH_NAME" ]; then
                  for f in "$PATH_NAME"/*; do
                    [ -e "$f" ] || continue
                    [ -f "$f" ] || continue
                    case "$f" in
                      *.yml|*.yaml) ;;
                      *) continue ;;
                    esac
                    WF_FILE=".github/workflows/$(basename "$f")"
                    git checkout "$ORIG_REF" -- "$WF_FILE" 2>/dev/null || true
                  done
                else
                  case "$PATH_NAME" in
                    *.yml|*.yaml) ;;
                    *)
                      echo "::error::Workflow file must be .yml or .yaml: $PATH_NAME"
                      exit 1
                      ;;
                  esac
                  WF_FILE=".github/workflows/$(basename "$PATH_NAME")"
                  git checkout "$ORIG_REF" -- "$WF_FILE" 2>/dev/null || true
                fi
                git add .
                git commit -m "Release $PATH_NAME $VER (workflow subtree)"
              else
                # Action subtree: tag contains only PATH_NAME folder (path preserved)
                git checkout --orphan "$SUBTREE_BRANCH"
                git rm -rf .
                git checkout "$ORIG_REF" -- "$PATH_NAME"
                git add "$PATH_NAME"
                git commit -m "Release $PATH_NAME $VER (subtree)"
              fi

              git tag "$FULL_TAG" -m "Release $PATH_NAME $VER (subtree)" "$SUBTREE_BRANCH"
              git tag -f "$STABLE_TAG" -m "Stable $PATH_NAME $MAJOR" "$SUBTREE_BRANCH"
              git push origin "$FULL_TAG"
              git push origin "$STABLE_TAG" --force
              git checkout "$ORIG_BRANCH"
              git branch -D "$SUBTREE_BRANCH"
              git push origin --delete "$SUBTREE_BRANCH" 2>/dev/null || true
              echo "Subtree tag created: $FULL_TAG"
            else
              if git show-ref --tags --verify --quiet "refs/tags/$FULL_TAG"; then
                echo "::error::Tag already exists: $FULL_TAG"
                exit 1
              fi
              git tag "$FULL_TAG" -m "Release $PATH_NAME $VER"
              git tag -f "$STABLE_TAG" -m "Stable $PATH_NAME $MAJOR"
              git push origin "$FULL_TAG"
              git push origin "$STABLE_TAG" --force
            fi
          else
            echo "Rolling back $STABLE_TAG to point to $FULL_TAG..."
            if ! git show-ref --tags --verify --quiet "refs/tags/$FULL_TAG"; then
              echo "::error::Cannot rollback; tag does not exist: $FULL_TAG"
              exit 1
            fi
            git tag -f "$STABLE_TAG" "$FULL_TAG"
            git push origin "$STABLE_TAG" --force
          fi
