# =============================================================================
# Platform Component Manager
# =============================================================================
# RC → Promote → Rollback for actions and reusable workflows. Tags use short
# names (component-v1, component-X.Y.Z) from the last path segment; component_path
# accepts any prefix (e.g. actions/name, workflows/name, <prefix>/actions|workflows/name).
# Trigger: workflow_dispatch only. Branches: RC on develop; promote/rollback on main.
#
# ACTIONS: actions/checkout@v4, actions/attest-build-provenance@v2.
# Third-party: bridgecrewio/checkov-action@v12 (component workflow + full-repo Checkov).
# =============================================================================

name: Platform Component Manager

on:
  workflow_dispatch:
    inputs:
      component_path:
        description: 'Path: actions/name, workflows/name, or <prefix>/actions|workflows/name'
        required: true
        type: string
      version:
        description: 'Optional. Auto-derived: RC = latest on main + minor bump or 1.0.0; Promote = latest RC; Rollback = previous release'
        required: false
        type: string
      mode:
        description: 'Release stage'
        required: true
        type: choice
        options:
          - rc        # Create RC tag (component-X.Y.Z-rc) on develop
          - promote   # Promote RC to main; create version + stable tags (component-X.Y.Z, component-v1)
          - rollback  # Move stable pointer (component-v1) to previous version

concurrency:
  group: pcm-${{ github.event.inputs.component_path }}
  cancel-in-progress: false

jobs:
  # =============================================================================
  # STAGE 1: INPUT & PATH VALIDATION
  # =============================================================================
  # Path/type validation; version derivation (component-v1 + last 10 version tags).
  # RC gate (promote requires RC tag); SemVer gate; action metadata or Checkov on component; broken-link check.
  # Outputs: type, component_path, component_name, version.
  # =============================================================================
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      type: ${{ steps.check.outputs.type }}
      component_path: ${{ steps.check.outputs.component_path }}
      component_name: ${{ steps.check.outputs.component_name }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Path and RC Validation
        id: check
        run: |
          # Shell-injection proof: allowlist only. Never use raw input in commands.
          PATH_NAME="${{ github.event.inputs.component_path }}"
          VER_INPUT="${{ github.event.inputs.version }}"
          MODE="${{ github.event.inputs.mode }}"

          # 0. Strict input validation: any prefix allowed, then (actions|workflows)/name; safe for git tag, cp, paths
          if ! [[ "$PATH_NAME" =~ ^([a-zA-Z0-9_.-]+/)*(actions|workflows)/[a-zA-Z0-9_.-]+$ ]]; then
            echo "::error::Invalid component_path (allowed: actions/name, workflows/name, or <prefix>/actions|workflows/name)"
            exit 1
          fi

          # 1. Path Check
          [[ -d "$PATH_NAME" ]] || { echo "::error::Path $PATH_NAME not found"; exit 1; }

          # 2. Set Type and component name (last path segment; used for short tag names: component-v1, component-1.0.0)
          [[ "$PATH_NAME" == workflows/* || "$PATH_NAME" == *"/workflows/"* ]] && echo "type=workflow" >> "$GITHUB_OUTPUT" || echo "type=action" >> "$GITHUB_OUTPUT"
          echo "component_path=$PATH_NAME" >> "$GITHUB_OUTPUT"
          COMPONENT_NAME="${PATH_NAME##*/}"
          echo "component_name=$COMPONENT_NAME" >> "$GITHUB_OUTPUT"

          # 3. Resolve version: use input if valid SemVer, else derive (component-v1 + last 10 version tags)
          if [[ -n "$VER_INPUT" && "$VER_INPUT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VER="$VER_INPUT"
          else
            COMPONENT_NAME="${PATH_NAME##*/}"
            if [[ "$MODE" == "rc" ]]; then
              # Use "latest on main" as starting point: the version that v1 points to (canonical current release)
              STABLE_TAG="${COMPONENT_NAME}-v1"
              V1_SHA=$(git rev-parse "$STABLE_TAG" 2>/dev/null || true)
              LATEST=""
              if [[ -n "$V1_SHA" ]]; then
                V1_POINTS_TO=$(git tag -l "${COMPONENT_NAME}-[0-9]*" | while IFS= read -r t; do
                  [[ -z "$t" ]] && continue
                  [[ "$(git rev-parse "$t" 2>/dev/null)" == "$V1_SHA" ]] && echo "$t" && break
                done)
                [[ -n "$V1_POINTS_TO" ]] && LATEST=$(echo "$V1_POINTS_TO" | sed -e "s#^${COMPONENT_NAME}-##")
              fi
              # Fallback: highest version tag in repo (e.g. no v1 yet)
              if [[ -z "$LATEST" ]]; then
                LATEST=$(git tag -l "${COMPONENT_NAME}-[0-9]*" | sed -e "s#^${COMPONENT_NAME}-##" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 || true)
              fi
              if [[ -z "$LATEST" ]]; then
                VER="1.0.0"
              else
                MAJOR=$(echo "$LATEST" | awk -F. '{print $1}')
                MINOR=$(echo "$LATEST" | awk -F. '{print $2+1}')
                PATCH=0
                VER="${MAJOR}.${MINOR}.${PATCH}"
              fi
              echo "::notice::Version derived for RC: $VER (latest on main + minor bump or 1.0.0)"
            elif [[ "$MODE" == "promote" ]]; then
              RC_LATEST=$(git tag -l "${COMPONENT_NAME}-*-rc" | sed -e "s#^${COMPONENT_NAME}-##" -e 's/-rc$//' | sort -V -r | head -n 1 || true)
              if [[ -z "$RC_LATEST" ]]; then
                echo "::error::No RC tag found for $PATH_NAME. Run RC mode on develop first."
                exit 1
              fi
              VER="$RC_LATEST"
              echo "::notice::Version derived for Promote: $VER (latest RC)"
            elif [[ "$MODE" == "rollback" ]]; then
              PREV=$(git tag -l "${COMPONENT_NAME}-[0-9]*" | sed -e "s#^${COMPONENT_NAME}-##" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V -r | sed -n '2p' || true)
              if [[ -z "$PREV" ]]; then
                echo "::error::No previous version to roll back to for $PATH_NAME. Provide version input."
                exit 1
              fi
              VER="$PREV"
              echo "::notice::Version derived for Rollback: $VER (previous release)"
            else
              echo "::error::Invalid mode or version required"
              exit 1
            fi
          fi

          if ! [[ "$VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version (allowed: SemVer X.Y.Z)"
            exit 1
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"

          # 4. PROMOTION GATE: Verify RC tag exists if promoting to main
          if [[ "$MODE" == "promote" ]]; then
            RC_TAG="${COMPONENT_NAME}-${VER}-rc"
            if ! git rev-parse "$RC_TAG" >/dev/null 2>&1; then
              echo "::error::Gate Denied: No RC tag found ($RC_TAG). You must run 'rc' mode on develop first."
              exit 1
            fi
            echo "RC Tag verified. Proceeding."

            # 5. SemVer gate: ensure new version is greater than existing versions for this component
            EXISTING_VERSIONS=$(git tag -l "${COMPONENT_NAME}-[0-9]*" \
              | sed -e "s#^${COMPONENT_NAME}-##" \
              | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V || true)
            if [[ -n "$EXISTING_VERSIONS" ]]; then
              LATEST_VER=$(echo "$EXISTING_VERSIONS" | tail -n 1)
              if [[ "$LATEST_VER" != "$VER" ]]; then
                LOWEST=$(printf '%s\n%s\n' "$VER" "$LATEST_VER" | sort -V | head -n 1)
                if [[ "$LOWEST" != "$LATEST_VER" ]]; then
                  echo "::error::Version regression detected. Latest existing=$LATEST_VER, requested=$VER"
                  exit 1
                fi
              fi
            fi
          fi

      - name: Validate action metadata (basic)
        if: steps.check.outputs.type == 'action'
        run: |
          # PATH_NAME already validated by check step (allowlist)
          PATH_NAME="${{ github.event.inputs.component_path }}"
          FILE=""
          if [ -f "$PATH_NAME/action.yml" ]; then
            FILE="$PATH_NAME/action.yml"
          elif [ -f "$PATH_NAME/action.yaml" ]; then
            FILE="$PATH_NAME/action.yaml"
          else
            echo "::error::Missing action.yml in $PATH_NAME"
            exit 1
          fi
          echo "Validating basic structure of $FILE"
          grep -q '^name:' "$FILE" || { echo "::error::action.yml missing top-level 'name:'"; exit 1; }
          grep -q '^runs:' "$FILE" || { echo "::error::action.yml missing top-level 'runs:'"; exit 1; }

      - name: Checkov – component workflow (single path)
        if: steps.check.outputs.type == 'workflow'
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ github.event.inputs.component_path }}
          framework: github_actions
          quiet: true

      - name: Check for broken links (Markdown)
        run: |
          set -e
          ROOT="${{ github.workspace }}"
          FAILED=0
          while IFS= read -r -d '' f; do
            grep -oE '\]\([^)]+\)' "$f" | sed -E 's/^\]\(//;s/\)$//' | while read -r link; do
              [[ -z "$link" ]] && continue
              [[ "$link" == '#'* ]] && continue
              [[ "$link" == 'http://'* ]] && continue
              [[ "$link" == 'https://'* ]] && continue
              [[ "$link" == 'mailto:'* ]] && continue
              DIR=$(dirname "$f")
              TARGET="$DIR/$link"
              TARGET=$(realpath -m "$TARGET" 2>/dev/null || echo "$TARGET")
              [[ "$TARGET" == "$ROOT"* ]] || continue
              FILE="${link%%#*}"
              [[ -z "$FILE" ]] && continue
              CHECK=$(realpath --canonicalize-missing "$DIR/$FILE" 2>/dev/null || echo "")
              if [[ ! -f "$CHECK" ]]; then
                echo "::error::Broken link: $link (in $f)"
                FAILED=1
              fi
            done
          done < <(find . -name "*.md" -not -path "./.git/*" -print0)
          [[ $FAILED -eq 0 ]] || exit 1

  # =============================================================================
  # STAGE 2: SECURITY (SPVS) – COMPONENT-SCOPED
  # =============================================================================
  # Checkov (GitHub Actions) and ShellCheck on the component being released only.
  # Must pass before execute. Needs: validate.
  # =============================================================================
  security-spvs:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      COMPONENT_PATH: ${{ needs.validate.outputs.component_path }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkov – GitHub Actions (component)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ needs.validate.outputs.component_path }}
          framework: github_actions
          quiet: true

      - name: Shell scripts – shellcheck (component)
        run: |
          set -e
          found=0
          while IFS= read -r -d '' f; do
            shellcheck --external-sources -e SC1090 "$f" || { echo "::error::shellcheck failed: $f"; exit 1; }
            found=1
          done < <(find "$COMPONENT_PATH" -name '*.sh' -not -path '*/.git/*' -print0 2>/dev/null || true)
          if [[ "$found" -eq 0 ]]; then
            echo "No .sh files under $COMPONENT_PATH; skipping shellcheck."
          fi

  # =============================================================================
  # STAGE 2b: SPVS NATIVE SECURITY GATE (component-scoped)
  # =============================================================================
  # ShellCheck and Bandit on component path; least-privilege check (no write-all); attest build provenance.
  # Must pass before execute. Needs: validate.
  # =============================================================================
  security-gate:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
      attestations: write
    env:
      COMPONENT_PATH: ${{ github.event.inputs.component_path }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ShellCheck (Bash hardening, component path)
        run: |
          # No sudo/apt needed on ubuntu-latest (shellcheck v0.58+ pre-installed)
          found=0
          while IFS= read -r -d '' f; do
            shellcheck --external-sources "$f" || { echo "::error::shellcheck failed: $f"; exit 1; }
            found=1
          done < <(find "$COMPONENT_PATH" -name '*.sh' -not -path '*/.git/*' -print0 2>/dev/null || true)
          if [[ "$found" -eq 0 ]]; then
            echo "No .sh files under $COMPONENT_PATH; skipping shellcheck."
          fi

      - name: Bandit (Python security, component path – CLI only)
        run: |
          set -euo pipefail
          COMPONENT_PATH="${{ github.event.inputs.component_path }}"
          if ! command -v bandit >/dev/null 2>&1; then
            pip install --quiet bandit
          fi
          if find "$COMPONENT_PATH" -name '*.py' -print0 2>/dev/null | grep -qz .; then
            bandit -r "$COMPONENT_PATH" -lll
          else
            echo "No Python files under $COMPONENT_PATH; skipping Bandit."
          fi

      - name: Ensure least privilege (no write-all)
        run: |
          set -euo pipefail
          # Exclude this workflow file (contains the check and its messages); flag actual permission usage elsewhere
          if grep -rn "write-all" .github/workflows/ 2>/dev/null | grep -v 'platform-component-manager.yml:' | while read -r line; do
            rest="${line#*:}"
            rest="${rest#*:}"
            [[ "$rest" =~ ^[[:space:]]*# ]] && continue
            [[ "$rest" == *"Violation"* ]] && continue
            [[ "$rest" == *"granular"* ]] && continue
            [[ "$rest" == *"No write-all"* ]] && continue
            [[ "$rest" == *"Ensure least privilege"* ]] && continue
            [[ "$rest" == *"no write-all"* ]] && [[ "$rest" == *"name:"* ]] && continue
            echo "$line"
          done | grep -q .; then
            echo "::error::Violation: write-all permissions detected. Use granular scopes."
            exit 1
          fi
          echo "No write-all permissions found."

      - name: Attest build provenance (component)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ github.event.inputs.component_path }}
          subject-name: "component:${{ github.event.inputs.component_path }}"

  # =============================================================================
  # STAGE 3: EXECUTION (RELEASE)
  # =============================================================================
  # Checkout target branch (develop for rc, main for promote/rollback). RC: create component-X.Y.Z-rc.
  # Promote: workflow sync to .github/workflows (if workflow), create component-X.Y.Z and component-v1, prune old tags, changelog.
  # Rollback: restore workflows from target tag, move component-v1 to target, delete rolled-back version tag. Attest release.
  # Needs: validate, security-spvs, security-gate.
  # =============================================================================
  execute:
    needs: [validate, security-spvs, security-gate]
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.mode == 'rc' && 'staging' || 'production' }}
      url: https://github.com/${{ github.repository }}/tree/${{ github.event.inputs.mode == 'rc' && 'develop' || 'main' }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout Target Branch
        uses: actions/checkout@v4
        with:
          # RC goes to develop, Promote/Rollback goes to main
          ref: ${{ github.event.inputs.mode == 'rc' && 'develop' || 'main' }}
          fetch-depth: 0
          # Prefer GITHUB_TOKEN; use COMMIT_TOKEN only when branch protection blocks default token.
          # For least-privilege on protected branches, use a GitHub App token (see readme) instead of a PAT.
          token: ${{ secrets.COMMIT_TOKEN || github.token }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Process Release and Prune Tags
        run: |
          # Use validated outputs from validate job (single source of truth; no re-evaluation).
          PATH_NAME="${{ needs.validate.outputs.component_path }}"
          COMPONENT_NAME="${{ needs.validate.outputs.component_name }}"
          VER="${{ needs.validate.outputs.version }}"
          MODE="${{ github.event.inputs.mode }}"
          TYPE="${{ needs.validate.outputs.type }}"
          # Tag format: component-v1 (stable), component-X.Y.Z (version). Consumer: uses: ORG/REPO/<component_path>@<component_name>-v1
          STABLE_TAG="${COMPONENT_NAME}-v1"

          if [[ "$MODE" == "rc" ]]; then
            # --- RC MODE (Develop Branch) ---
            TAG="${COMPONENT_NAME}-${VER}-rc"
            git tag -f "$TAG"
            git push origin "$TAG" --force
            echo "::notice::RC Tag $TAG created on develop."

          elif [[ "$MODE" == "promote" ]]; then
            # --- PROMOTE MODE (Main Branch) ---

            # 0. Integrity failure check: RC tag SHA must match main HEAD before any stable tags
            RC_TAG="${COMPONENT_NAME}-${VER}-rc"
            if ! git rev-parse "$RC_TAG" >/dev/null 2>&1; then
              echo "::error::INTEGRITY FAILURE: RC tag $RC_TAG not found. Promotion blocked."
              exit 1
            fi
            RC_SHA=$(git rev-parse "$RC_TAG")
            MAIN_HEAD_SHA=$(git rev-parse HEAD)
            if [[ "$RC_SHA" != "$MAIN_HEAD_SHA" ]]; then
              echo "::error::INTEGRITY FAILURE: The commit tested as RC ($RC_SHA) does not match the commit on Main ($MAIN_HEAD_SHA). Promotion blocked."
              exit 1
            fi

            # 1. If Workflow, sync files to .github/workflows on main
            if [[ "$TYPE" == "workflow" ]]; then
               mkdir -p .github/workflows
               cp -v "$PATH_NAME"/*.yml .github/workflows/ 2>/dev/null || true
               # SPVS V3 Integrity: .github/workflows must contain only YAML (no .sh, .py, etc.)
               for f in .github/workflows/*; do
                 [[ -e "$f" ]] || continue
                 [[ -f "$f" ]] || continue
                 ext="${f##*.}"
                 if [[ "$ext" != "yml" && "$ext" != "yaml" ]]; then
                   echo "::error::Non-YAML file in .github/workflows: $f (SPVS V3 integrity)"
                   exit 1
                 fi
               done
               git add .github/workflows/
               git commit -m "deploy($PATH_NAME): $VER [skip ci]" || echo "No changes"
               git push origin main
            fi

            # 2. Create release tag and move stable pointer (v1 only; last 10 version tags kept below)
            FULL_TAG="${COMPONENT_NAME}-${VER}"

            # Determine previous version tag (before creating the new one)
            PREV_TAG=$(git tag -l "${COMPONENT_NAME}-[0-9]*" | sort -V | tail -n 1 || true)

            git tag -a "$FULL_TAG" -m "Release $VER"
            git tag -f "$STABLE_TAG" -m "Stable (latest release)"
            git push origin "$FULL_TAG"
            git push origin "$STABLE_TAG" --force

            # 3. Cleanup RC tag
            git push origin --delete "${COMPONENT_NAME}-${VER}-rc" || true

            # 4. PRUNING: keep at least last 10 version tags; delete older only if beyond 10 and older than 14 days
            PRUNE_DAYS=14
            KEEP_LAST_N=10
            CUTOFF_UNIX=$(($(date +%s) - PRUNE_DAYS*24*3600))
            V1_SHA=$(git rev-parse "$STABLE_TAG" 2>/dev/null || true)
            ALL_VERSION_TAGS=$(git tag -l "${COMPONENT_NAME}-[0-9]*" | sort -V -r || true)
            PROTECTED=$(echo "$ALL_VERSION_TAGS" | head -n "$KEEP_LAST_N")
            echo "Pruning version tags for $COMPONENT_NAME: keep last $KEEP_LAST_N; delete older than $PRUNE_DAYS days only if beyond that..."

            echo "$ALL_VERSION_TAGS" | while IFS= read -r OLD_TAG; do
              [[ -z "$OLD_TAG" ]] && continue
              # Match component-X.Y.Z (glob; avoid regex so component name dots are literal)
              [[ "$OLD_TAG" == "${COMPONENT_NAME}-"[0-9]*.[0-9]*.[0-9]* ]] || continue
              echo "$PROTECTED" | grep -Fxq "$OLD_TAG" && echo "Skipping (in last $KEEP_LAST_N): $OLD_TAG" && continue
              [[ -n "$V1_SHA" ]] && [[ "$(git rev-parse "$OLD_TAG" 2>/dev/null)" == "$V1_SHA" ]] && echo "Skipping (v1 points here): $OLD_TAG" && continue
              TAG_DATE=$(git for-each-ref "refs/tags/${OLD_TAG}" --format='%(creatordate:unix)' 2>/dev/null)
              [[ -z "$TAG_DATE" || ! "$TAG_DATE" =~ ^[0-9]+$ ]] && continue
              if [[ $TAG_DATE -lt $CUTOFF_UNIX ]]; then
                echo "Deleting tag (beyond last $KEEP_LAST_N and older than $PRUNE_DAYS days): $OLD_TAG"
                git tag -d "$OLD_TAG" 2>/dev/null || true
                git push origin --delete "$OLD_TAG" || true
              fi
            done

            # 4b. Prune RC tags older than 14 days (so old RCs don't accumulate on develop)
            echo "Pruning RC tags for $COMPONENT_NAME older than $PRUNE_DAYS days..."
            git tag -l "${COMPONENT_NAME}-*-rc" | while IFS= read -r RC_TAG; do
              [[ -z "$RC_TAG" ]] && continue
              TAG_DATE=$(git for-each-ref "refs/tags/${RC_TAG}" --format='%(creatordate:unix)' 2>/dev/null)
              [[ -z "$TAG_DATE" || ! "$TAG_DATE" =~ ^[0-9]+$ ]] && continue
              if [[ $TAG_DATE -lt $CUTOFF_UNIX ]]; then
                echo "Deleting RC tag (older than $PRUNE_DAYS days): $RC_TAG"
                git tag -d "$RC_TAG" 2>/dev/null || true
                git push origin --delete "$RC_TAG" || true
              fi
            done

            # 5. Auto-changelog between previous tag and current HEAD (scoped to component path)
            if [[ -n "$PREV_TAG" && "$PREV_TAG" != "$FULL_TAG" ]]; then
              echo "Generating changelog from $PREV_TAG..HEAD for $PATH_NAME"
              {
                echo "### Changelog for $PATH_NAME $VER"
                git log --oneline --pretty=format:"* %s (%h)" "$PREV_TAG"..HEAD -- "$PATH_NAME" || echo "* No commits found for path $PATH_NAME between $PREV_TAG and HEAD."
              } >> "$GITHUB_STEP_SUMMARY"
            else
              echo "No previous version tag found for $COMPONENT_NAME; skipping changelog."
            fi

          elif [[ "$MODE" == "rollback" ]]; then
            # --- ROLLBACK MODE (Main Branch) ---
            FULL_TAG="${COMPONENT_NAME}-${VER}"

            if ! git rev-parse "$FULL_TAG" >/dev/null 2>&1; then
              echo "::error::Cannot rollback; target tag not found: $FULL_TAG"
              exit 1
            fi

            # Capture current v1 target (the release we're rolling back from; we'll delete its tag after moving v1)
            V1_CURRENT_SHA=$(git rev-parse "$STABLE_TAG" 2>/dev/null || true)

            # State reversion: restore .github/workflows from target tag so main matches the tag
            if [[ "$TYPE" == "workflow" ]]; then
              echo "Restoring .github/workflows from $FULL_TAG to match stable state..."
              git checkout "$FULL_TAG" -- .github/workflows/
              git add .github/workflows/
              git diff --staged --quiet || { git commit -m "rollback($PATH_NAME): restore .github/workflows to $VER [skip ci]"; git push origin main; }
            fi

            git tag -f "$STABLE_TAG" -m "Stable (rollback to $VER)" "$FULL_TAG"
            git push origin "$STABLE_TAG" --force
            echo "::notice::Rolled back $STABLE_TAG to $FULL_TAG."

            # Delete the version tag we rolled back from (e.g. 2.0.0 when rolling v1 to 1.9.5)
            if [[ -n "$V1_CURRENT_SHA" && "$V1_CURRENT_SHA" != "$(git rev-parse "$FULL_TAG" 2>/dev/null)" ]]; then
              git tag -l "${COMPONENT_NAME}-[0-9]*" | while IFS= read -r t; do
                [[ -z "$t" ]] && continue
                [[ "$t" == "$FULL_TAG" ]] && continue
                if [[ "$(git rev-parse "$t" 2>/dev/null)" == "$V1_CURRENT_SHA" ]]; then
                  echo "Deleting tag rolled back from: $t"
                  git tag -d "$t" 2>/dev/null || true
                  git push origin --delete "$t" || true
                fi
              done
            fi
          fi

      - name: Attest build provenance (release)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: .
          subject-name: "release:${{ github.event.inputs.component_path }}@${{ github.event.inputs.version }}"

  # =============================================================================
  # ROLLBACK VALIDATION
  # =============================================================================
  # Verify stable tag (component-v1) and target version tag (component-X.Y.Z) point to same commit.
  # Runs only when mode is rollback. Needs: validate, execute.
  # =============================================================================
  validate-rollback:
    needs: [validate, execute]
    if: github.event.inputs.mode == 'rollback'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      COMPONENT_NAME: ${{ needs.validate.outputs.component_name }}
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Checkout (for git refs)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify rollback pointer alignment
        run: |
          set -euo pipefail
          # Stable and version tags: component-v1, component-X.Y.Z (no path prefix in tag names)
          STABLE_TAG="${COMPONENT_NAME}-v1"
          FULL_TAG="${COMPONENT_NAME}-${VERSION}"

          SHA_STABLE=$(git rev-parse "$STABLE_TAG")
          SHA_FULL=$(git rev-parse "$FULL_TAG")

          if [[ "$SHA_STABLE" != "$SHA_FULL" ]]; then
            echo "::error::Rollback validation failed: $STABLE_TAG ($SHA_STABLE) does not point to $FULL_TAG ($SHA_FULL). Broken stable state."
            exit 1
          fi

          echo "### Rollback verification (SPVS audit trail)" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stable tag (v1) | \`$STABLE_TAG\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Target tag | \`$FULL_TAG\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit SHA | \`$SHA_STABLE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pointers match | Yes |" >> "$GITHUB_STEP_SUMMARY"
          echo "::notice::Rollback verified: $STABLE_TAG and $FULL_TAG both point to $SHA_STABLE"

  # =============================================================================
  # STAGE 4: AUDIT & SUMMARY
  # =============================================================================
  # Append release results to GITHUB_STEP_SUMMARY: validate, security-spvs, security-gate, execute status; component_path, mode.
  # Always runs (if: always()). Needs: validate, security-spvs, security-gate, execute.
  # =============================================================================
  audit:
    needs: [validate, security-spvs, security-gate, execute]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Generate Summary
        run: |
          echo "### 🚀 Release Results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Validate | ${{ needs.validate.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Security (SPVS full repo) | ${{ needs.security-spvs.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Security Gate (native) | ${{ needs.security-gate.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Execute | ${{ needs.execute.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "* **Component:** ${{ github.event.inputs.component_path }}" >> "$GITHUB_STEP_SUMMARY"
          echo "* **Mode:** ${{ github.event.inputs.mode }}" >> "$GITHUB_STEP_SUMMARY"

