name: Platform Component Manager

on:
  workflow_dispatch:
    inputs:
      component_path:
        description: 'Path: actions/name OR workflows/name'
        required: true
        type: string
      version:
        description: 'Version (e.g., 1.2.0)'
        required: true
        type: string
      mode:
        description: 'Release Stage'
        required: true
        type: choice
        options:
          - rc        # Create RC tag on DEVELOP branch
          - promote   # Sync to MAIN and create STABLE tags
          - rollback  # Revert stable pointer to previous version

jobs:
  # --- STAGE 1: VALIDATION & GATEKEEPING ---
  validate:
    runs-on: ubuntu-latest
    outputs:
      type: ${{ steps.check.outputs.type }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Path and RC Validation
        id: check
        run: |
          PATH_NAME="${{ github.event.inputs.component_path }}"
          VER="${{ github.event.inputs.version }}"
          MODE="${{ github.event.inputs.mode }}"

          # 1. Path Check
          [[ -d "$PATH_NAME" ]] || { echo "::error::Path $PATH_NAME not found"; exit 1; }

          # 2. Set Type (Workflow vs Action)
          [[ "$PATH_NAME" == workflows/* ]] && echo "type=workflow" >> "$GITHUB_OUTPUT" || echo "type=action" >> "$GITHUB_OUTPUT"

          # 3. PROMOTION GATE: Verify RC tag exists if promoting to main
          if [[ "$MODE" == "promote" ]]; then
            RC_TAG="${PATH_NAME}/${VER}-rc"
            if ! git rev-parse "$RC_TAG" >/dev/null 2>&1; then
              echo "::error::Gate Denied: No RC tag found ($RC_TAG). You must run 'rc' mode on develop first."
              exit 1
            fi
            echo "RC Tag verified. Proceeding."

            # 4. SemVer gate: ensure new version is greater than existing versions for this component
            # Only consider full release tags like path/1.2.3 (exclude RC tags such as path/1.2.3-rc)
            EXISTING_VERSIONS=$(git tag -l "${PATH_NAME}/*" \
              | sed -e "s#^${PATH_NAME}/##" \
              | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V || true)
            if [[ -n "$EXISTING_VERSIONS" ]]; then
              LATEST_VER=$(echo "$EXISTING_VERSIONS" | tail -n 1)
              if [[ "$LATEST_VER" != "$VER" ]]; then
                LOWEST=$(printf '%s\n%s\n' "$VER" "$LATEST_VER" | sort -V | head -n 1)
                if [[ "$LOWEST" != "$LATEST_VER" ]]; then
                  echo "::error::Version regression detected. Latest existing=$LATEST_VER, requested=$VER"
                  exit 1
                fi
              fi
            fi
          fi

      - name: Validate action metadata (basic)
        if: steps.check.outputs.type == 'action'
        run: |
          PATH_NAME="${{ github.event.inputs.component_path }}"
          FILE=""
          if [ -f "$PATH_NAME/action.yml" ]; then
            FILE="$PATH_NAME/action.yml"
          elif [ -f "$PATH_NAME/action.yaml" ]; then
            FILE="$PATH_NAME/action.yaml"
          else
            echo "::error::Missing action.yml in $PATH_NAME"
            exit 1
          fi
          echo "Validating basic structure of $FILE"
          grep -q '^name:' "$FILE" || { echo "::error::action.yml missing top-level 'name:'"; exit 1; }
          grep -q '^runs:' "$FILE" || { echo "::error::action.yml missing top-level 'runs:'"; exit 1; }

  # --- STAGE 2: EXECUTION ---
  execute:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.mode == 'rc' && 'staging' || 'production' }}
      url: https://github.com/${{ github.repository }}/tree/${{ github.event.inputs.mode == 'rc' && 'develop' || 'main' }}
    permissions:
      contents: write
    steps:
      - name: Checkout Target Branch
        uses: actions/checkout@v4
        with:
          # RC goes to develop, Promote/Rollback goes to main
          ref: ${{ github.event.inputs.mode == 'rc' && 'develop' || 'main' }}
          fetch-depth: 0
          token: ${{ secrets.COMMIT_TOKEN || github.token }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Process Release and Prune Tags
        run: |
          PATH_NAME="${{ github.event.inputs.component_path }}"
          VER="${{ github.event.inputs.version }}"
          MODE="${{ github.event.inputs.mode }}"
          TYPE="${{ needs.validate.outputs.type }}"
          MAJOR="v$(echo "$VER" | cut -d. -f1)"

          if [[ "$MODE" == "rc" ]]; then
            # --- RC MODE (Develop Branch) ---
            TAG="${PATH_NAME}/${VER}-rc"
            git tag -f "$TAG"
            git push origin "$TAG" --force
            echo "::notice::RC Tag $TAG created on develop."

          elif [[ "$MODE" == "promote" ]]; then
            # --- PROMOTE MODE (Main Branch) ---

            # 0. Self-healing gate: ensure RC commit matches current HEAD on main
            RC_TAG="${PATH_NAME}/${VER}-rc"
            if git rev-parse "$RC_TAG" >/dev/null 2>&1; then
              RC_COMMIT=$(git rev-parse "$RC_TAG")
              HEAD_COMMIT=$(git rev-parse HEAD)
              if [[ "$RC_COMMIT" != "$HEAD_COMMIT" ]]; then
                echo "::error::RC tag $RC_TAG ($RC_COMMIT) does not match main HEAD ($HEAD_COMMIT). Ensure main contains the tested RC commit before promoting."
                exit 1
              fi
            else
              echo "::error::RC tag $RC_TAG not found during promote."
              exit 1
            fi

            # 1. If Workflow, sync files to .github/workflows on main
            if [[ "$TYPE" == "workflow" ]]; then
               mkdir -p .github/workflows
               cp -v "$PATH_NAME"/*.yml .github/workflows/ 2>/dev/null || true
               git add .github/workflows/
               git commit -m "deploy($PATH_NAME): $VER [skip ci]" || echo "No changes"
               git push origin main
            fi

            # 2. Create Stable Tags
            FULL_TAG="${PATH_NAME}/${VER}"
            STABLE_MAJOR="${PATH_NAME}/${MAJOR}"

            # Determine previous version tag (before creating the new one)
            PREV_TAG=$(git tag -l "${PATH_NAME}/[0-9]*" | sort -V | tail -n 1 || true)

            git tag -a "$FULL_TAG" -m "Release $VER"
            git tag -f "$STABLE_MAJOR" -m "Moving $MAJOR pointer"
            git push origin "$FULL_TAG"
            git push origin "$STABLE_MAJOR" --force

            # 3. Cleanup RC tag
            git push origin --delete "${PATH_NAME}/${VER}-rc" || true

            # 4. ROLLING 5 PRUNING
            echo "Pruning old tags for $PATH_NAME (keeping latest 5)..."

            # Get all version tags for this path (excluding major alias), newest first
            ALL_TAGS=$(git tag -l "${PATH_NAME}/[0-9]*" | sort -V -r || true)

            if [[ -n "$ALL_TAGS" ]]; then
              COUNT=$(echo "$ALL_TAGS" | wc -l | tr -d ' ')
              if [ "$COUNT" -gt 5 ]; then
                TAGS_TO_DELETE=$(echo "$ALL_TAGS" | tail -n +6)
                for OLD_TAG in $TAGS_TO_DELETE; do
                  echo "Deleting old tag: $OLD_TAG"
                  git tag -d "$OLD_TAG" || true
                  git push origin --delete "$OLD_TAG" || true
                done
              fi
            fi

            # 5. Auto-changelog between previous tag and current HEAD (path-scoped)
            if [[ -n "$PREV_TAG" && "$PREV_TAG" != "$FULL_TAG" ]]; then
              echo "Generating changelog from $PREV_TAG..HEAD for $PATH_NAME"
              {
                echo "### Changelog for $PATH_NAME $VER"
                git log --oneline --pretty=format:"* %s (%h)" "$PREV_TAG"..HEAD -- "$PATH_NAME" || echo "* No commits found for path $PATH_NAME between $PREV_TAG and HEAD."
              } >> "$GITHUB_STEP_SUMMARY"
            else
              echo "No previous version tag found for $PATH_NAME; skipping changelog."
            fi

          elif [[ "$MODE" == "rollback" ]]; then
            # --- ROLLBACK MODE (Main Branch) ---
            FULL_TAG="${PATH_NAME}/${VER}"
            MAJOR_TAG="${PATH_NAME}/v$(echo "$VER" | cut -d. -f1)"

            if ! git rev-parse "$FULL_TAG" >/dev/null 2>&1; then
              echo "::error::Cannot rollback; target tag not found: $FULL_TAG"
              exit 1
            fi

            git tag -f "$MAJOR_TAG" -m "Stable $MAJOR_TAG" "$FULL_TAG"
            git push origin "$MAJOR_TAG" --force
            echo "::notice::Rolled back $MAJOR_TAG to $FULL_TAG."
          fi

  # --- STAGE 3: AUDIT ---
  audit:
    needs: [validate, execute]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          echo "### 🚀 Release Results" >> "$GITHUB_STEP_SUMMARY"
          echo "* **Component:** ${{ github.event.inputs.component_path }}" >> "$GITHUB_STEP_SUMMARY"
          echo "* **Mode:** ${{ github.event.inputs.mode }}" >> "$GITHUB_STEP_SUMMARY"
          echo "* **Status:** ${{ needs.execute.result }}" >> "$GITHUB_STEP_SUMMARY"

