# =============================================================================
# Test git-path-filter action
# =============================================================================
# Runs path-filter with ** recursion and negation; ensures docs/tfvars groups
# and _unmatched work. Trigger: push/PR to main touching the action or this workflow.
# =============================================================================

name: Test path-filter

on:
  pull_request:
    branches: [main]
    paths:
      - 'devtools-landingzone/actions/git-path-filter/**'
      - 'devtools-landingzone/.github/workflows/test-path-filter.yml'
  push:
    branches: [main]
    paths:
      - 'devtools-landingzone/actions/git-path-filter/**'
      - 'devtools-landingzone/.github/workflows/test-path-filter.yml'

jobs:
  test-path-filter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set refs for detection
        id: refs
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "source=${{ github.head_ref }}" >> $GITHUB_OUTPUT
            echo "base=${{ github.base_ref }}" >> $GITHUB_OUTPUT
          else
            echo "source=${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "base=${{ github.event.before || github.event.repository.default_branch }}" >> $GITHUB_OUTPUT
          fi

      - name: Test path-filter (** recursion and negation)
        id: filter
        uses: ./devtools-landingzone/actions/git-path-filter
        with:
          source_branch: ${{ steps.refs.outputs.source }}
          base_ref_branch: ${{ steps.refs.outputs.base }}
          pattern_filter: |
            docs:
              - '**/*.md'
              - '!docs/drafts/**'
            tfvars:
              - '**/*.tfvars'

      - name: Assert outputs
        run: |
          set -euo pipefail
          JSON="${{ steps.filter.outputs.changes_json }}"
          [ -n "${JSON}" ]
          echo "changes_json length: ${#JSON}"
          # From JSON: at least one of docs/tfvars or _unmatched may have has_changes
          echo "${JSON}" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert 'docs' in d and 'tfvars' in d and '_unmatched' in d
          assert 'has_changes' in d['docs'] and 'files' in d['docs']
          print('OK: structure valid')
          "
