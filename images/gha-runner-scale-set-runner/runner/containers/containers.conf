# Engine: file events logger (avoids systemd/journal in pods).
[engine]
events_logger = "file"

# Containers: no child cgroups (ROSA blocks them); no default sysctls; host net/userns
# so nested containers avoid cgroup/namespace setup that triggers OCI permission denied.
# cgroup_manager only supports "systemd"|"cgroupfs" - use cgroups=disabled to skip child cgroup.
[containers]
default_sysctls = []
cgroups = "disabled"
netns = "host"
userns = "host"
